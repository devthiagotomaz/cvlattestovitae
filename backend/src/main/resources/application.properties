server.port=8080
spring.application.name=cvlattestovitae

# Max file upload size (10 MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf — disable Spring MVC auto-rendering (we use standalone engine for PDF)
spring.thymeleaf.enabled=false

# Logging
logging.level.br.com.cvlattestovitae=INFO
